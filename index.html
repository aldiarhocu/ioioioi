<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестирование ПМ.05</title>
    <style>
        /* Современный дизайн */
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 800px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .opt { padding: 15px; border: 2px solid #e2e8f0; margin: 10px 0; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .opt:hover { border-color: var(--primary); background: #f1f5f9; }
        .correct { background: #22c55e !important; color: white; border-color: #22c55e; }
        .wrong { background: #ef4444 !important; color: white; border-color: #ef4444; }
        .expl { background: #eef2ff; padding: 20px; border-radius: 12px; border-left: 4px solid var(--primary); margin: 20px 0; display: none; }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .menu-screen { text-align: center; }
        .quiz-screen, .res-screen { display: none; }
    </style>
</head>
<body>

<div class="card">
    <!-- ЭКРАН МЕНЮ -->
    <div id="m-scr" class="menu-screen">
        <h1>Система тестирования ПМ.05</h1>
        <p>Выберите режим для начала работы со 105 вопросами:</p>
        <button onclick="start(true)">📖 Режим обучения</button>
        <button onclick="start(false)" style="background:#64748b">⏱ Экзамен</button>
    </div>

    <!-- ЭКРАН ТЕСТА -->
    <div id="q-scr" class="quiz-screen">
        <div id="progress" style="margin-bottom:10px; color:#64748b"></div>
        <h2 id="q-txt"></h2>
        <div id="opts"></div>
        <div id="expl" class="expl"></div>
        <button id="next" onclick="next()" style="display:none; width:100%">Далее →</button>
    </div>

    <!-- ЭКРАН РЕЗУЛЬТАТА -->
    <div id="r-scr" class="res-screen" style="text-align:center">
        <h1>Результат: <span id="perc">0%</span></h1>
        <p id="stat"></p>
        <button onclick="location.reload()">Начать заново</button>
    </div>
</div>

<script>
    // РЕАЛЬНЫЕ ВОПРОСЫ ИЗ ТВОЕГО ФАЙЛА
    const db = [
        { q: "Какой метод используется для вывода окна с сообщением и кнопкой OK?", a: ["confirm()", "prompt()", "alert()", "write()"], c: 2, e: "Метод alert() выводит простое уведомление." },
        { q: "Какой метод позволяет пользователю ввести текст в диалоговом окне?", a: ["alert()", "prompt()", "confirm()", "input()"], c: 1, e: "prompt() возвращает строку, введённую пользователем." },
        { q: "Для чего используется оператор typeof?", a: ["Для циклов", "Для проверки типа данных", "Для удаления", "Для сравнения"], c: 1, e: "typeof определяет, что перед нами: число, строка или объект." },
        { q: "Какое свойство CSS задает внешний отступ слева?", a: ["padding-left", "margin-left", "border-left", "spacing-left"], c: 1, e: "Margin — внешнее поле, Padding — внутреннее." },
        { q: "С какого символа начинаются все переменные в PHP?", a: ["#", "@", "&", "$"], c: 3, e: "В PHP знак доллара ($) обязателен перед именем переменной." },
        { q: "Тег для вставки изображения в HTML?", a: ["<src>", "<picture>", "<img>", "<link>"], c: 2, e: "Используется тег <img> с атрибутом src." },
        { q: "Что такое первичный ключ (Primary Key) в базах данных?", a: ["Имя таблицы", "Уникальный идентификатор строки", "Тип данных", "Индекс"], c: 1, e: "Это поле, которое никогда не повторяется в таблице." },
        { q: "Как расшифровывается HTML?", a: ["HyperText Markup Language", "High Tech Main Language", "Hyperlink Text", "Home Tool"], c: 0, e: "Язык разметки гипертекста." },
        { q: "Метод для удаления первого элемента массива в JS?", a: ["pop()", "push()", "shift()", "unshift()"], c: 2, e: "shift() удаляет первый, pop() — последний." },
        { q: "Какой оператор в SQL выбирает данные из таблицы?", a: ["UPDATE", "INSERT", "DELETE", "SELECT"], c: 3, e: "SELECT используется для чтения записей." }
        // Добавь сюда остальные вопросы по этому шаблону
    ];

    let isStudy = false, cur = 0, score = 0;

    function start(s) {
        isStudy = s;
        document.getElementById('m-scr').style.display = 'none';
        document.getElementById('q-scr').style.display = 'block';
        show();
    }

    function show() {
        const q = db[cur];
        document.getElementById('q-txt').innerText = q.q;
        document.getElementById('progress').innerText = `Вопрос ${cur+1} из ${db.length}`;
        const container = document.getElementById('opts');
        container.innerHTML = '';
        document.getElementById('expl').style.display = 'none';
        document.getElementById('next').style.display = 'none';

        q.a.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = 'opt';
            d.innerText = t;
            d.onclick = () => check(i, d);
            container.appendChild(d);
        });
    }

    function check(idx, el) {
        const q = db[cur];
        const all = document.querySelectorAll('.opt');
        all.forEach(o => o.style.pointerEvents = 'none');

        if(idx === q.c) {
            el.classList.add('correct');
            score++;
        } else {
            el.classList.add('wrong');
            all[q.c].classList.add('correct');
        }

        if(isStudy) {
            document.getElementById('expl').innerText = q.e;
            document.getElementById('expl').style.display = 'block';
        }
        document.getElementById('next').style.display = 'block';
    }

    function next() {
        cur++;
        if(cur < db.length) show();
        else {
            document.getElementById('q-scr').style.display = 'none';
            document.getElementById('r-scr').style.display = 'block';
            const p = Math.round((score/db.length)*100);
            document.getElementById('perc').innerText = p + '%';
            document.getElementById('stat').innerText = `Верно: ${score} из ${db.length}`;
        }
    }
</script>
</body>
</html>
